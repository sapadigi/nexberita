<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview Tema - Nex Development</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #111;
        }

        /* TOOLBAR */

        .toolbar {
            background: #262626;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            color: white;
        }

        .logo {
            font-weight: bold;
        }

        .devices {
            display: flex;
            gap: 10px;
        }

        .devices button {
            background: #444;
            border: none;
            color: white;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        .devices button:hover {
            background: #666;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            background: #27ae60;
            color: white;
            padding: 7px 12px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 14px;
        }

        .close {
            background: #e74c3c;
        }

        /* PREVIEW */

        .preview {
            display: flex;
            justify-content: center;
            background: #111;
            height: calc(100vh - 60px);
            overflow: auto;
        }

        iframe {
            border: none;
            width: 100%;
            height: 100%;
            transition: 0.3s;
            flex-shrink: 0;
        }

        /* DEVICE MODE */

        .desktop iframe {
            width: 100%;
            min-width: 1024px;
        }

        .tablet iframe {
            width: 768px;
        }

        .mobile iframe {
            width: 375px;
        }

        /* RESPONSIVE (MOBILE) */
        @media (max-width: 600px) {
            .toolbar {
                flex-wrap: wrap;
                height: auto;
                padding: 10px 5px;
                gap: 10px;
                justify-content: center;
            }
            .preview {
                height: calc(100vh - 100px);
            }
            .devices button {
                padding: 5px 8px;
                font-size: 12px;
            }
            .btn {
                padding: 5px 10px;
                font-size: 12px;
            }
            .logo {
                width: 100%;
                text-align: center;
                margin-bottom: 5px;
            }
        }
    </style>
</head>

<body>

    <div class="toolbar">

        <div class="logo">
            Nex Development
        </div>

        <div class="devices">

            <button onclick="setDevice('desktop')">Desktop</button>

            <button onclick="setDevice('tablet')">Tablet</button>

            <button onclick="setDevice('mobile')">Mobile</button>

        </div>

        <div class="actions">

            <a class="btn" href="https://wa.me/6285179915187" target="_blank">
                Pesan Website
            </a>

            <a class="btn close" href="index.html">
                Close
            </a>

        </div>

    </div>


    <div id="preview" class="preview mobile">

        <iframe id="frame"></iframe>

    </div>


    <script>

        const params = new URLSearchParams(window.location.search);
        const theme = params.get("theme");

        const urls = {

            majalahpro: "https://preview.bostheme.com/majalahpro/",
            bloggingpro: "https://preview.bostheme.com/bloggingpro/",
            newkarma: "https://preview.bostheme.com/newkarma/",
            wpberita: "https://preview.bostheme.com/wpberita/",
            kibaran: "https://demo.pojoksoft.com/kibaran/",
            warta: "https://warta.oketheme.com/"

        };

        document.getElementById("frame").src = urls[theme];

        function setDevice(device) {

            const preview = document.getElementById("preview");

            preview.className = "preview " + device;

        }

    </script>

</body>

</html>
